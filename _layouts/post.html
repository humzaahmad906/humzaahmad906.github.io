---
layout: default
---
<div class="blog-hero">
  <div class="container">
    <h1>{{ page.title }}</h1>
    <div class="post-meta" style="color: rgba(255,255,255,0.8); margin-top: 10px;">
      {{ page.date | date: "%B %-d, %Y" }}{% if page.author %} &middot; {{ page.author }}{% endif %}
    </div>
  </div>
</div>

<div class="blog-content">
  <div class="container">
    <article class="post-body">
      {{ content }}
    </article>
    <hr style="margin-top: 40px;">
    <p><a href="{{ '/blog/' | relative_url }}">&larr; Back to all posts</a></p>
  </div>
</div>
